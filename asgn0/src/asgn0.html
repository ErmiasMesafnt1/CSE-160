<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSE 160 Assignment 0 — Vectors (Ch. 2 canvas basis)</title>
  <!--
    WebGL Programming Guide (Matsuda & Lea), Chapter 2 — “Your First Step with WebGL”
    Examples and downloads: https://sites.google.com/site/webglbook
    This page extends Listing 2.1 (DrawRectangle): same canvas setup + cuon-matrix-cse160.js per course.
  -->
</head>
<body onload="main()">
  <canvas id="webgl" width="400" height="400">
    Please use a browser that supports the canvas element.
  </canvas>
  <div style="margin-top: 8px;">
    <label>v1: x <input type="text" id="v1x" value="0" size="6"></label>
    <label> y <input type="text" id="v1y" value="7" size="6"></label>
  </div>
  <div>
    <label>v2: x <input type="text" id="v2x" value="5" size="6"></label>
    <label> y <input type="text" id="v2y" value="0" size="6"></label>
  </div>
  <div>
    <button type="button" id="drawVectorsBtn">Draw</button>
  </div>
  <div style="margin-top: 12px;">
    <label>Operation
      <select id="operation">
        <option value="add">Add</option>
        <option value="subtract">Subtract</option>
        <option value="multiply">Multiply</option>
        <option value="divide">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angle">Angle Between</option>
        <option value="area">Area</option>
      </select>
    </label>
  </div>
  <div>
    <label>Scalar: <input type="text" id="scalar" value="1" size="6"></label>
  </div>
  <div>
    <button type="button" id="drawOperationBtn">Draw</button>
  </div>

  <script src="../lib/cuon-matrix-cse160.js"></script>
  <script src="asgn0.js"></script>
</body>
</html>
